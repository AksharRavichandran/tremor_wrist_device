; PlatformIO Project Configuration
; Primary target: ESP32 (recommended for PWM + I2C + SD)
; Fallback: Arduino Nano (comment/uncomment below)

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags = -DARDUINO_ESP32
lib_deps =
    electroniccats/MPU6050 @ ^1.3.0
    SPI
    SD

; [env:nano]
; platform = atmelavr
; board = nanoatmega328
; framework = arduino
; monitor_speed = 115200
; lib_deps =
;     electroniccats/MPU6050 @ ^1.3.0
